<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>OWASP Juice Shop login</title>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box;}
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 28px;
            color: #0f3460;
        }
        .logo p {
            color: #888;
            font-size: 14px;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
            outline: none;
        }
        input:focus {
            border-color: #0f3460;
        }
        input.error {
            border-color: #e74c3c;
        }
        .error-msg {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }
        .error-msg.visible {
            display: block;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #0f3460;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background: #1a4a8a;
        }
        .btn-login:disabled {
            background: #aaa;
            cursor: not-allowed;
        }
        #login-result {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        #login-result.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        #login-result.failure {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .note {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
        </style>
    </head>
    <body>
        <div class="login-container">
            <div class="logo">
                <h1>OWASP Juice Shop</h1>
                <p>Please log in to continue</p>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
                <div class="error-msg" id="email-error"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
                <div class="error-msg" id="password-error"></div>
            </div>

            <button class="btn-login" id="login-btn" onclick="handleLogin()">Log In</button>

            <p class="note">CSCE 477 &mdash; Secure Login Form Demo</p>
        </div>

        <script>
            // client-side validation scripts
            function validateEmail(email){
                if (!email || email.trim() == ''){
                    return 'Email is required.';
                }
                if (!email.includes('@')){
                    return 'Email must include an "@" symbol.';
                }

                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    return 'Please enter a valid email address.';
                }
                return null;
            }

            function validatePassword(password){
                if (!password || password.trim() == ''){
                    return 'Password is required.';
                }
                if (password.length() < 8){
                    return 'Password must be at least 8 characters long.';
                }
                return null;
            }

            function showError(fieldId, message){
                const input = document.getElementById(fieldId);
                const errorDiv = document.getElementById(fieldID + '-error');
                input.classList.add('error');
                errorDiv.textContent = message;
                errorDiv.classList.add('visible');
            }

            function clearError(fieldId){
                const input = document.getElementById(fieldId);
                const errorDiv = document.getElementById(fieldId + '-error');
                input.classList.remove('error');
                errorDiv.textContent = '';
                errorDiv.classList.remove('visible');
            }

            function showResult(message, isSuccess){
                const resultDiv = document.getElementById('login-result');
                resultDiv.textContent = message;
                resultDiv.className = isSuccess ? 'success' : 'failure';
            }

        </script>
    </body>
</html>
